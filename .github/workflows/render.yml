name: Render Kindle Dashboard

on:
  schedule:
    # Every 30 minutes (UTC). 00/30 UTC = 08:30 / 09:00 Beijing, etc.
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chinese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Render dashboard
        env:
          QWEATHER_API_HOST: ${{ secrets.QWEATHER_API_HOST }}
          QWEATHER_JWT: ${{ secrets.QWEATHER_JWT }}
          QWEATHER_KID: ${{ secrets.QWEATHER_KID }}
          QWEATHER_PROJECT_ID: ${{ secrets.QWEATHER_PROJECT_ID }}
          QWEATHER_PRIVATE_KEY: ${{ secrets.QWEATHER_PRIVATE_KEY }}
          FONT_PATH: /usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc
        run: python render.py

      - name: Commit dashboard image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/dashboard.png
          if git diff --staged --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
